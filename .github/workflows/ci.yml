name: GPDB Continuous Integration

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Code Quality & Stability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Static Analysis
        run: cargo check --all-targets

      - name: Run All Tests
        run: cargo test --verbose --all-targets

  benchmarks:
    name: Performance Analysis
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release --bins --benches

      - name: Storage Efficiency Analysis
        run: cargo run --release --bin space_bench

      - name: Throughput & Latency Analysis
        run: cargo run --release --bin db_bench
